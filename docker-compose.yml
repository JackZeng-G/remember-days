services:
  anniversary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anniversary-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 持久化数据目录
      - ./data:/app/data
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      - CSRF_KEY=${CSRF_KEY:-change-me-in-production-csrf}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s