<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑纪念日</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page-background">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="grain-overlay"></div>
    </div>

    <div class="container container-small">
        <nav class="back-nav">
            <a href="/" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>返回首页</span>
            </a>
        </nav>

        <header class="form-header">
            <div class="form-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
            </div>
            <h1 class="form-title">编辑纪念日</h1>
            <p class="form-subtitle">修改纪念日的详细信息</p>
        </header>

        <form action="/edit/{{.ID}}" method="POST" class="form">
            <div class="form-section">
                <div class="form-section-title">
                    <span class="section-number">1</span>
                    <span>基本信息</span>
                </div>

                <div class="form-group">
                    <label for="name" class="form-label">
                        <span class="label-text">纪念日名称</span>
                        <span class="label-badge label-required">必填</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="name" name="name" required
                               value="{{.Name}}"
                               class="form-input" autofocus>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">
                    <span class="section-number">2</span>
                    <span>选择日期</span>
                </div>

                <div class="form-row form-row-three">
                    <div class="form-group form-group-year">
                        <label for="year" class="form-label">
                            <span class="label-text">年份</span>
                            <span class="label-badge label-required">必填</span>
                        </label>
                        <div class="select-wrapper">
                            <select id="year" name="year" required class="form-select">
                            </select>
                        </div>
                    </div>

                    <div class="form-group form-group-month">
                        <label for="month" class="form-label">
                            <span class="label-text">月份</span>
                            <span class="label-badge label-required">必填</span>
                        </label>
                        <div class="select-wrapper">
                            <select id="month" name="month" required class="form-select">
                                <option value="01" {{if eq .Month "01"}}selected{{end}}>1月 · 正月</option>
                                <option value="02" {{if eq .Month "02"}}selected{{end}}>2月 · 二月</option>
                                <option value="03" {{if eq .Month "03"}}selected{{end}}>3月 · 三月</option>
                                <option value="04" {{if eq .Month "04"}}selected{{end}}>4月 · 四月</option>
                                <option value="05" {{if eq .Month "05"}}selected{{end}}>5月 · 五月</option>
                                <option value="06" {{if eq .Month "06"}}selected{{end}}>6月 · 六月</option>
                                <option value="07" {{if eq .Month "07"}}selected{{end}}>7月 · 七月</option>
                                <option value="08" {{if eq .Month "08"}}selected{{end}}>8月 · 八月</option>
                                <option value="09" {{if eq .Month "09"}}selected{{end}}>9月 · 九月</option>
                                <option value="10" {{if eq .Month "10"}}selected{{end}}>10月 · 十月</option>
                                <option value="11" {{if eq .Month "11"}}selected{{end}}>11月 · 冬月</option>
                                <option value="12" {{if eq .Month "12"}}selected{{end}}>12月 · 腊月</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group form-group-day">
                        <label for="day" class="form-label">
                            <span class="label-text">日期</span>
                            <span class="label-badge label-required">必填</span>
                        </label>
                        <div class="select-wrapper">
                            <select id="day" name="day" required class="form-select">
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">
                    <span class="section-number">3</span>
                    <span>备注说明</span>
                    <span class="section-optional">可选</span>
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">
                        <span class="label-text">添加备注</span>
                    </label>
                    <textarea id="description" name="description" rows="3"
                              placeholder="例如：需要提前准备礼物、要订蛋糕..."
                              class="form-textarea">{{.Description}}</textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    保存修改
                </button>
                <a href="/" class="btn btn-secondary btn-block">取消</a>
            </div>
        </form>
    </div>

    <script>
        // 年份选择器初始化
        const yearSelect = document.getElementById('year');
        const currentYear = "{{.Year}}";
        const thisYear = new Date().getFullYear();
        for (let i = thisYear + 1; i >= 1950; i--) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i + '年';
            if (i.toString() === currentYear || (currentYear === "" && i === thisYear)) {
                option.selected = true;
            }
            yearSelect.appendChild(option);
        }

        const monthSelect = document.getElementById('month');
        const daySelect = document.getElementById('day');
        const currentDay = "{{.Day}}";

        const daysInMonth = {
            '01': 31, '02': 29, '03': 31, '04': 30,
            '05': 31, '06': 30, '07': 31, '08': 31,
            '09': 30, '10': 31, '11': 30, '12': 31
        };

        function updateDays() {
            const month = monthSelect.value;
            const days = daysInMonth[month] || 31;

            daySelect.innerHTML = '';
            for (let i = 1; i <= days; i++) {
                const option = document.createElement('option');
                option.value = i.toString().padStart(2, '0');
                option.textContent = i + '日';
                if (option.value === currentDay) {
                    option.selected = true;
                }
                daySelect.appendChild(option);
            }
        }

        monthSelect.addEventListener('change', updateDays);
        updateDays();
    </script>
</body>
</html>
